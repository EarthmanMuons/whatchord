[default]
locale = "en-us"

[files]
# exclude Xcode project and Interface Builder files, the compiled Dart-to-JS
# bundle (minified identifiers trip the spell checker), and research data splits
extend-exclude = [
  "*.pbxproj",
  "*.xib",
  "docs/site/js/chord-id.js",
  "research/chord-context/data/splits/"
]

# Don't correct these false positives

[type.dart]
extend-ignore-re = [
  # plural ordinal suffixes (e.g. "4ths") used in musical-interval terminology
  "\\b\\d+ths\\b",

  # string interpolation followed by an ordinal suffix (e.g. `${n}nd`)
  "\\$\\{[^}]+\\}nd\\b",

  # chord symbols with an added tone (e.g. "Aadd#9", "Aadd♯9")
  "\\b[A-G](?:[#b♯♭])?add[#b♯♭]?\\d+\\b",
]

[type.html]
extend-ignore-re = [
  # plural ordinal suffixes (e.g. "4ths") used in musical-interval terminology
  "\\b\\d+ths\\b",
]

[type.json]
extend-ignore-re = [
  # chord symbols with an added tone (e.g. "Aadd#9", "Aadd♯9")
  "\\b[A-G](?:[#b♯♭])?add[#b♯♭]?\\d+\\b",
]

[type.md]
extend-ignore-re = [
  # plural ordinal suffixes (e.g. "4ths") used in musical-interval terminology
  "\\b\\d+ths\\b",

  # "mis-" prefix coinages (e.g. "mis-key"); the checker splits on the hyphen
  # and flags the bare "mis" fragment
  "\\bmis-[a-z]+",
]

[type.readme]
# oddly, the built-in `readme` type isn't matching this properly
extend-glob = ["README.md"]
extend-ignore-re = [
  # developer certificate SHA-256 fingerprint
  "(?i)\\b(?:[0-9a-f]{2}:){31}[0-9a-f]{2}\\b",

  # "mis-" prefix coinages (e.g. "mis-key"); the checker splits on the hyphen
  # and flags the bare "mis" fragment
  "\\bmis-[a-z]+",
]

[type.storyboard]
extend-glob = ["*.storyboard"]
extend-ignore-re = [
  # Xcode storyboard attribute: autogenerated scene identifiers
  "\\bsceneID\\=\"[^\"]+\"",
]
