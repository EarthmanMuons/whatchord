[tools]
node = "22"
python = "3.12.13"
uv = "0.11.16"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks."css:lint:install"]
description = "Install stylelint and shared config for site CSS"
run = "npm install --no-package-lock"

[tasks."css:lint"]
description = "Lint site CSS with stylelint"
depends = ["css:lint:install"]
run = "npx stylelint 'docs/site/css/*.css'"

[tasks."css:lint:fix"]
description = "Lint and auto-fix site CSS with stylelint"
depends = ["css:lint:install"]
run = "npx stylelint --fix 'docs/site/css/*.css'"

[tasks."python:format"]
description = "Format Python tooling with Ruff"
run = "uvx ruff@latest format tool"

[tasks."python:lint"]
description = "Lint Python tooling with Ruff"
run = "uvx ruff@latest check tool"

[tasks."research:python-install"]
description = "Install pinned optional Python dependencies for research tasks"
run = "uv pip install -r tool/requirements-research.txt"

[tasks."research:oracle-install"]
description = "Install optional chord oracle dependencies for local comparison runs"
depends = ["research:python-install"]
run = [
  "npm install --no-package-lock",
]

[tasks."research:oracle-compare"]
description = "Run the full chord oracle comparison pass with reviewed audit"
depends = ["research:oracle-install"]
run = "python tool/chord/oracle_compare.py"

[tasks."research:rule-ablation"]
description = "Measure whether each ranking rule still changes any pool outcome"
run = "python tool/chord/rule_ablation.py"

[tasks."research:choco-coverage"]
description = "Summarize ChoCo chord-label coverage against WhatChord support"
run = """
choco_root="${CHOCO_ROOT:-/private/tmp/choco}"
if [ ! -d "$choco_root/partitions" ]; then
  echo "ChoCo corpus checkout not found at $choco_root" >&2
  echo "Set CHOCO_ROOT or follow research/choco-chord-coverage.md" >&2
  exit 1
fi
python tool/chord/choco/chord_label_stats.py "$choco_root" --jams-version converted --top 50
"""

[tasks."research:choco-prior"]
description = "Regenerate the ChoCo common-name prior Dart source from the corpus"
run = """
choco_root="${CHOCO_ROOT:-/private/tmp/choco}"
if [ ! -d "$choco_root/partitions" ]; then
  echo "ChoCo corpus checkout not found at $choco_root" >&2
  echo "Set CHOCO_ROOT or follow research/choco-chord-coverage.md" >&2
  exit 1
fi
python tool/chord/choco/common_name_prior.py "$choco_root" --jams-version converted
"""

[tasks."research:when-in-rome-install"]
description = "Install optional dependencies for the When-in-Rome benchmark"
depends = ["research:python-install"]
run = "true"

[tasks."research:when-in-rome"]
description = "Run the expanded When-in-Rome chord benchmark"
depends = ["research:when-in-rome-install"]
run = """
bench_root="${CONTRAPUNCTUS_BENCH_ROOT:-/private/tmp/contrapunctus-bench}"
if [ ! -f "$bench_root/corpus/manifest.json" ]; then
  echo "Contrapunctus benchmark checkout not found at $bench_root" >&2
  echo "Set CONTRAPUNCTUS_BENCH_ROOT or follow research/contrapunctus-benchmark-comparison.md" >&2
  exit 1
fi
python tool/chord/when_in_rome_benchmark.py \
  "$bench_root" \
  --groups bach-wtc mozart-sonatas-dcml brahms-lieder schubert-lieder \
    chorales tavern \
  --out-dir build/when-in-rome-chord-benchmark-expanded
"""

[tasks."research:whatkey-fixtures-pop-jazz"]
description = "Regenerate the WhatKey hand-authored pop/jazz fixture set (current version)"
run = """
python tool/whatkey/fixture_extract.py \
  --set pop-jazz-v2 \
  --out research/whatkey/data/fixtures \
  charts --charts-dir research/whatkey/data/sources/pop-jazz
"""

[tasks."research:whatkey-fixtures-when-in-rome"]
description = "Generate WhatKey fixtures from When-in-Rome (to build/; license-gated before committing)"
depends = ["research:when-in-rome-install"]
run = """
bench_root="${CONTRAPUNCTUS_BENCH_ROOT:-/private/tmp/contrapunctus-bench}"
if [ ! -f "$bench_root/corpus/manifest.json" ]; then
  echo "Contrapunctus benchmark checkout not found at $bench_root" >&2
  echo "Set CONTRAPUNCTUS_BENCH_ROOT or follow research/contrapunctus-benchmark-comparison.md" >&2
  exit 1
fi
python tool/whatkey/fixture_extract.py \
  --set when-in-rome-v1 \
  --out build/whatkey-fixtures \
  when-in-rome --bench-root "$bench_root" \
  --groups bach-wtc brahms-lieder schubert-lieder tavern
"""

[tasks."research:whatkey-fixtures-asap"]
description = "Generate WhatKey fixtures from ASAP performances (to build/; noncommercial-gated)"
run = """
asap_root="${ASAP_ROOT:-/private/tmp/asap-dataset}"
if [ ! -f "$asap_root/asap_annotations.json" ]; then
  echo "ASAP checkout not found at $asap_root" >&2
  echo "Set ASAP_ROOT or: git clone --depth 1 https://github.com/fosfrancesco/asap-dataset.git $asap_root" >&2
  exit 1
fi
python tool/whatkey/asap_extract.py --asap-root "$asap_root" --set asap-nc-v2 --max-performances 60
"""

[tasks."research:whatkey-harness-pop-jazz"]
description = "Run the WhatKey harness on the hand-authored behavioral suite"
run = "dart run tool/whatkey/harness.dart --fixtures research/whatkey/data/fixtures/pop-jazz-v2"

[tasks."research:whatkey-harness-dev"]
description = "Run the WhatKey harness on the When-in-Rome development split"
run = """
dart run tool/whatkey/harness.dart \
  --fixtures research/whatkey/data/fixtures/when-in-rome-v1 \
  --split-file research/whatkey/data/splits/when-in-rome-v1.json
"""

[tasks."research:whatkey-baselines-dev"]
description = "Score music21 external key baselines on the When-in-Rome development split"
depends = ["research:when-in-rome-install"]
run = """
python tool/whatkey/external_baseline.py \
  --fixtures research/whatkey/data/fixtures/when-in-rome-v1 \
  --split-file research/whatkey/data/splits/when-in-rome-v1.json
for f in build/whatkey-baselines/when-in-rome-v1-development/*.claims.json; do
  dart run tool/whatkey/harness.dart \
    --fixtures research/whatkey/data/fixtures/when-in-rome-v1 \
    --split-file research/whatkey/data/splits/when-in-rome-v1.json \
    --claims-file "$f"
done
"""

[tasks."research:chord-context-labels"]
description = "Generate expected-identity labels for the chord-context headroom study"
depends = ["research:python-install"]
run = """
python tool/chord-context/expected_labels.py \
  --fixtures research/whatkey/data/fixtures/when-in-rome-v1 \
  --out build/chord-context/labels/when-in-rome-v1.labels.json
"""

[tasks."research:chord-context-headroom-dev"]
description = "Run the chord-context headroom harness on the When-in-Rome development split"
run = """
dart run tool/chord-context/headroom.dart \
  --fixtures research/whatkey/data/fixtures/when-in-rome-v1 \
  --labels build/chord-context/labels/when-in-rome-v1.labels.json \
  --split-file research/whatkey/data/splits/when-in-rome-v1.json \
  --split development \
  --out build/chord-context/headroom/wir-dev
"""

[tasks."research:whatkey-paper"]
description = "Compile the WhatKey paper (research/whatkey/paper/main.pdf)"
run = """
typst compile research/whatkey/paper/main.typ
"""

[tasks."research:whatkey-zenodo-bundle"]
description = "Bundle a tagged source archive and the WhatKey preprint for a manual Zenodo deposit"
run = "bash tool/whatkey/zenodo_bundle.sh \"$@\""

[tasks."research:whatkey-headline-verify"]
description = "Verify the README headline table from committed WhatKey result artifacts without rerunning detectors"
run = "python tool/whatkey/headline_table.py --check"

[tasks."research:whatkey-headline-rerun"]
description = "Prepare gated headline fixtures locally and rerun the detector/baseline code"
depends = ["research:python-install"]
run = "python tool/whatkey/prepare_data.py --run-headline \"$@\""

[tasks."research:whatkey-prepare-data"]
description = "Download pinned WhatKey research corpora into build/ and regenerate fixtures"
depends = ["research:python-install"]
run = "python tool/whatkey/prepare_data.py \"$@\""

[tasks."symbols:install"]
description = "Install Python dependencies for regenerating WhatChord Symbols fonts"
run = "uv pip install -r tool/whatchord_symbols/requirements.txt"

[tasks."symbols:build"]
description = "Regenerate the WhatChord Symbols font assets"
depends = ["symbols:install"]
run = "python tool/whatchord_symbols/build_font.py"

[tasks."symbols:specimen"]
description = "Regenerate the WhatChord Symbols font assets and specimen sheet"
depends = ["symbols:build"]
run = "python tool/whatchord_symbols/generate_specimen.py"
