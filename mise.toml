[tools]
node = "22"
python = "3.12"
uv = "latest"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks."css:lint:install"]
description = "Install stylelint and shared config for site CSS"
run = "npm install --no-save --no-package-lock stylelint stylelint-config-standard stylelint-config-recess-order"

[tasks."css:lint"]
description = "Lint site CSS with stylelint"
depends = ["css:lint:install"]
run = "npx stylelint 'docs/site/css/*.css'"

[tasks."css:lint:fix"]
description = "Lint and auto-fix site CSS with stylelint"
depends = ["css:lint:install"]
run = "npx stylelint --fix 'docs/site/css/*.css'"

[tasks."oracle:install"]
description = "Install optional chord oracle dependencies for local comparison runs"
run = [
  "uv pip install music21 pychord",
  "npm install --no-save --no-package-lock @tonaljs/tonal",
]

[tasks."oracle:compare"]
description = "Run the full chord oracle comparison pass with reviewed audit"
depends = ["oracle:install"]
run = "python tool/chord_oracle_compare.py"

[tasks."benchmark:install"]
description = "Install optional dependencies for the When-in-Rome benchmark"
run = "uv pip install music21"

[tasks."benchmark:when-in-rome"]
description = "Run the expanded When-in-Rome chord benchmark"
depends = ["benchmark:install"]
run = """
bench_root="${CONTRAPUNCTUS_BENCH_ROOT:-/private/tmp/contrapunctus-bench}"
if [ ! -f "$bench_root/corpus/manifest.json" ]; then
  echo "Contrapunctus benchmark checkout not found at $bench_root" >&2
  echo "Set CONTRAPUNCTUS_BENCH_ROOT or follow docs/research/contrapunctus-benchmark-comparison.md" >&2
  exit 1
fi
python tool/when_in_rome_chord_benchmark.py \
  "$bench_root" \
  --groups bach-wtc mozart-sonatas-dcml brahms-lieder schubert-lieder \
    chorales tavern \
  --out-dir build/when-in-rome-chord-benchmark-expanded
"""

[tasks."symbols:install"]
description = "Install Python dependencies for regenerating WhatChord Symbols fonts"
run = "uv pip install -r tool/whatchord_symbols/requirements.txt"

[tasks."symbols:build"]
description = "Regenerate the WhatChord Symbols font assets"
depends = ["symbols:install"]
run = "python tool/whatchord_symbols/build_font.py"

[tasks."symbols:specimen"]
description = "Regenerate the WhatChord Symbols font assets and specimen sheet"
depends = ["symbols:build"]
run = "python tool/whatchord_symbols/generate_specimen.py"
