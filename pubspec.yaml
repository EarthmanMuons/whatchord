name: whatchord
description: Real-time chord identification via Bluetooth MIDI.

publish_to: none
version: 2026.7.6+25

environment:
  # pinned version used for automated testing and releases
  flutter: 3.44.4
  # matching dart version for the above flutter release
  # https://docs.flutter.dev/install/archive#stable-channel
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  app_links: ^7.1.2
  auto_size_text: ^3.0.0
  collection: ^1.19.1
  dart_melty_soundfont: ^2.0.0
  flutter_midi_command: ^1.0.2
  flutter_midi_command_ble: ^1.0.2
  flutter_pcm_sound: ^3.3.3
  flutter_riverpod: ^3.0.3
  flutter_svg: ^2.2.3
  meta: ^1.17.0
  package_info_plus: ^10.1.0
  permission_handler: ^12.0.1
  share_plus: ^13.1.0
  shared_preferences: ^2.5.4
  url_launcher: ^6.3.2
  wakelock_plus: ^1.4.0

# Vendored copies of upstream 1.0.2 carrying two iOS BLE patches (see
# third_party/README.md); drop once upstream ships equivalent fixes.
dependency_overrides:
  flutter_midi_command:
    path: third_party/flutter_midi_command
  flutter_midi_command_ble:
    path: third_party/flutter_midi_command_ble

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  import_order_lint: ^0.2.2
  kiri_check: ^1.3.1
  riverpod_lint: ^3.1.3
  vm_service: ^15.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/glyphs/keyboard_pedal_ped.svg
    - assets/logos/whatchord_logo_circle.svg
    - assets/soundfonts/generaluser-gs-v2.0.2-grand-piano.sf2

  fonts:
    - family: WhatChord Symbols
      fonts:
        - asset: assets/fonts/WhatChordSymbols-Regular.otf
        - asset: assets/fonts/WhatChordSymbols-Bold.otf
          weight: 700

    - family: Inter
      fonts:
        - asset: assets/fonts/InterVariable.ttf
