name: flutter_midi_command_windows
description: No-op stub satisfying the flutter_midi_command Windows dep for iOS/Android-only builds.
version: 0.3.0

environment:
  sdk: ">=3.1.0 <4.0.0"
  flutter: ">=2.11.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_midi_command_platform_interface: ^0.4.1

flutter:
  plugin:
    implements: flutter_midi_command
    platforms:
      windows:
        dartPluginClass: FlutterMidiCommandWindows
